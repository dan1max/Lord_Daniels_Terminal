<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADMIN — LORD DANIEL'S TERMINAL</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=VT323&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="admin-body">

  <div class="crt-scanlines"></div>
  <div class="crt-vignette"></div>

  <!-- LOGIN FORM -->
  <div id="login-view">
    <div class="login-container">
      <div class="login-title">⚠ ACCESO RESTRINGIDO</div>
      <p style="font-size:11px;color:var(--green-dark);text-align:center;letter-spacing:2px;margin-bottom:1.5rem;">
        LORD DANIEL'S TERMINAL — PANEL DE CONTROL
      </p>

      <div class="form-group">
        <label class="form-label">EMAIL</label>
        <input type="email" id="login-email" class="form-input" placeholder="operador@terminal.es" />
      </div>
      <div class="form-group">
        <label class="form-label">CONTRASEÑA</label>
        <input type="password" id="login-password" class="form-input" placeholder="••••••••" />
      </div>

      <button id="btn-login" class="btn-primary">[ AUTENTICAR ]</button>
      <div id="login-error"></div>

      <div style="text-align:center;margin-top:1.5rem;">
        <a href="index.html" style="font-size:11px;color:var(--green-dark);letter-spacing:1px;">← VOLVER AL TERMINAL</a>
      </div>
    </div>
  </div>

  <!-- ADMIN PANEL -->
  <div id="admin-view" style="display:none;">

    <div class="admin-header">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div class="admin-title">⚙ PANEL DE CONTROL</div>
          <div class="admin-subtitle">LORD DANIEL'S TERMINAL — MODO OPERADOR</div>
        </div>
        <div style="display:flex;gap:1rem;align-items:center;">
          <a href="index.html" class="btn-secondary">← TERMINAL</a>
          <button id="btn-logout" class="btn-secondary">[ CERRAR SESIÓN ]</button>
        </div>
      </div>
    </div>

    <div id="admin-alert" style="display:none;"></div>

    <!-- TABS -->
    <div style="display:flex;gap:0.5rem;margin-bottom:1.5rem;border-bottom:1px solid var(--green-dark);padding-bottom:0.5rem;">
      <button class="nav-btn active" data-tab="predicciones">[ PREDICCIONES ]</button>
      <button class="nav-btn" data-tab="analisis">[ ANÁLISIS ]</button>
    </div>

    <!-- TAB: PREDICCIONES -->
    <div id="tab-predicciones" class="admin-tab">
      <div class="admin-grid">

        <!-- Formulario añadir -->
        <div class="admin-panel">
          <div class="admin-panel-header">▶ AÑADIR / EDITAR PREDICCIÓN</div>
          <div class="admin-panel-body">

            <input type="hidden" id="pred-id" value="" />

            <div class="form-group" style="margin-bottom:0.75rem;">
              <label class="form-label">SECCIÓN</label>
              <select id="pred-seccion" class="form-select">
                <option value="espana">España</option>
                <option value="economia">Economía Global</option>
                <option value="geopolitica">Geopolítica</option>
              </select>
            </div>

            <div class="form-group" style="margin-bottom:0.75rem;">
              <label class="form-label">TÍTULO</label>
              <input type="text" id="pred-titulo" class="form-input" placeholder="Ej: Victoria PP en próximas elecciones" />
            </div>

            <div class="form-group" style="margin-bottom:0.75rem;">
              <label class="form-label">DESCRIPCIÓN</label>
              <textarea id="pred-descripcion" class="form-textarea" placeholder="Análisis breve de la predicción..." rows="3"></textarea>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
              <div class="form-group">
                <label class="form-label">PROBABILIDAD %</label>
                <input type="number" id="pred-prob" class="form-input" min="0" max="100" placeholder="65" />
              </div>
              <div class="form-group">
                <label class="form-label">RIESGO</label>
                <select id="pred-riesgo" class="form-select">
                  <option value="low">Bajo</option>
                  <option value="mid">Medio</option>
                  <option value="high">Alto</option>
                </select>
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:0.75rem;">
              <div class="form-group">
                <label class="form-label">FECHA OBJETIVO</label>
                <input type="date" id="pred-fecha" class="form-input" />
              </div>
              <div class="form-group">
                <label class="form-label">TAGS (separados por coma)</label>
                <input type="text" id="pred-tags" class="form-input" placeholder="política, elecciones" />
              </div>
            </div>

            <div style="display:grid;grid-template-columns:1fr 1fr;gap:0.5rem;">
              <button id="btn-save-pred" class="btn-primary">[ GUARDAR ]</button>
              <button id="btn-clear-pred" class="btn-secondary">[ LIMPIAR ]</button>
            </div>
          </div>
        </div>

        <!-- Lista predicciones -->
        <div class="admin-panel">
          <div class="admin-panel-header" style="display:flex;justify-content:space-between;">
            <span>▶ PREDICCIONES ACTIVAS</span>
            <select id="filter-seccion" class="form-select" style="width:auto;font-size:10px;padding:2px 6px;">
              <option value="espana">España</option>
              <option value="economia">Economía</option>
              <option value="geopolitica">Geopolítica</option>
            </select>
          </div>
          <div class="admin-panel-body" id="pred-list">
            <div class="loading-text">CARGANDO...</div>
          </div>
        </div>

      </div>
    </div>

    <!-- TAB: ANÁLISIS -->
    <div id="tab-analisis" class="admin-tab" style="display:none;">
      <div class="admin-panel" style="max-width:800px;">
        <div class="admin-panel-header">▶ EDITAR ANÁLISIS</div>
        <div class="admin-panel-body">

          <div class="form-group" style="margin-bottom:1rem;">
            <label class="form-label">SECCIÓN</label>
            <select id="analisis-seccion" class="form-select">
              <option value="espana">España</option>
              <option value="economia">Economía Global</option>
              <option value="geopolitica">Geopolítica</option>
            </select>
          </div>

          <div class="form-group" style="margin-bottom:0.5rem;">
            <label class="form-label">CONTENIDO (usa *texto* para resaltar, doble salto de línea para párrafos)</label>
            <textarea id="analisis-contenido" class="form-textarea" rows="12"
              placeholder="El panorama político español muestra *tensiones crecientes*...

Segundo párrafo del análisis..."></textarea>
          </div>

          <div style="display:flex;gap:0.5rem;margin-top:1rem;">
            <button id="btn-load-analisis" class="btn-secondary">[ CARGAR EXISTENTE ]</button>
            <button id="btn-save-analisis" class="btn-primary">[ GUARDAR ANÁLISIS ]</button>
          </div>
        </div>
      </div>
    </div>

  </div><!-- /admin-view -->

  <script src="supabase.js"></script>
  <script src="auth.js"></script>
  <script src="admin.js"></script>
</body>
</html>
